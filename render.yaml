services:
  - type: web
    name: siloferr
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install --legacy-peer-deps --no-audit --no-fund && npx prisma generate && npm run build
    startCommand: npm start -- -p $PORT
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
